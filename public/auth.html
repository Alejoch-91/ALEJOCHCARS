<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Alejoch Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { explosive: '#ff3e00', open: '#ffffff' }, fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white p-10 rounded-3xl border border-gray-100 shadow-2xl text-center">
        <img src="Logo ALEJOCH.png" alt="Alejoch Cars" class="h-12 mx-auto mb-6" onerror="this.src='https://via.placeholder.com/150x50/ff3e00/ffffff?text=ALEJOCH'">
        <h2 id="titulo-form" class="text-2xl font-extrabold text-gray-950 mb-2">Iniciar Sesión</h2>
        <p id="subtitulo-form" class="text-sm text-gray-500 mb-8">Accede para gestionar tus vehículos.</p>

        <form id="authForm" class="space-y-5 text-left">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full border border-gray-200 p-4 rounded-xl focus:border-explosive focus:ring-1 focus:ring-explosive outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Contraseña</label>
                <input type="password" id="password" required class="w-full border border-gray-200 p-4 rounded-xl focus:border-explosive focus:ring-1 focus:ring-explosive outline-none">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-explosive text-white p-4 rounded-xl font-bold hover:bg-black transition-colors mt-4">Entrar</button>
        </form>

        <p class="mt-8 text-sm text-gray-500">
            <span id="texto-alterno">¿No tienes cuenta?</span> 
            <button onclick="toggleModo()" id="btn-alterno" class="text-explosive font-bold cursor-pointer hover:underline">Regístrate aquí</button>
        </p>
    </div>

    <script>
        // REEMPLAZA ESTO CON TUS CLAVES DE SUPABASE (Puedes usar la Anon Key pública aquí sin riesgo)
        const supabaseUrl = 'TU_URL_DE_SUPABASE';
        const supabaseKey = 'TU_ANON_KEY_DE_SUPABASE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let esRegistro = false;

        function toggleModo() {
            esRegistro = !esRegistro;
            document.getElementById('titulo-form').innerText = esRegistro ? "Crear Cuenta" : "Iniciar Sesión";
            document.getElementById('subtitulo-form').innerText = esRegistro ? "Únete como vendedor a Alejoch Cars." : "Accede para gestionar tus vehículos.";
            document.getElementById('btn-submit').innerText = esRegistro ? "Registrarme" : "Entrar";
            document.getElementById('texto-alterno').innerText = esRegistro ? "¿Ya tienes cuenta?" : "¿No tienes cuenta?";
            document.getElementById('btn-alterno').innerText = esRegistro ? "Inicia sesión" : "Regístrate aquí";
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');
            
            btn.innerText = "Procesando...";
            btn.disabled = true;

            try {
                let error;
                if (esRegistro) {
                    const res = await supabase.auth.signUp({ email, password });
                    error = res.error;
                    if (!error) alert("¡Registro exitoso! Ya puedes iniciar sesión (revisa tu correo si tienes confirmación activada).");
                } else {
                    const res = await supabase.auth.signInWithPassword({ email, password });
                    error = res.error;
                    if (!error) {
                        // Guardamos el token de sesión
                        localStorage.setItem('alejoch_token', res.data.session.access_token);
                        window.location.href = '/publicar.html';
                    }
                }

                if (error) throw error;
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerText = esRegistro ? "Registrarme" : "Entrar";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
