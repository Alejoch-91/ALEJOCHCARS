<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejoch Cars | Registrar Vehículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        explosive: '#ff3e00',
                        open: '#ffffff',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9fc; }
        input, textarea, select {
            border: 1px solid #e2e8f0;
            padding: 14px;
            border-radius: 14px;
            width: 100%;
            color: #1a202c;
            outline: none;
            transition: 0.3s;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #ff3e00;
            ring: 2px;
            ring-color: rgba(255, 62, 0, 0.2);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }
    </style>
</head>

<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="mb-12 flex flex-col items-center">
        <img src="Logo ALEJOCH.png" alt="Alejoch Cars" class="h-12 mb-4">
        <h1 class="text-3xl font-extrabold tracking-tighter text-gray-950 text-center">
            Registrar Vehículo <span class="text-explosive font-light">en Alejoch</span>
        </h1>
        <div class="flex gap-4 mt-4">
            <a href="/" class="text-gray-500 text-sm font-semibold">← Galería</a>
            <a href="/mis-publicaciones.html" class="text-explosive text-sm font-semibold">Mis Publicaciones →</a>
        </div>
    </header>

    <div class="max-w-md w-full bg-open p-10 rounded-3xl border border-gray-100 shadow-2xl">
        <form id="form">
            <div class="space-y-6">
                <div>
                    <label>Tipo de Vehículo</label>
                    <select name="tipo_vehiculo" required class="cursor-pointer">
                        <option value="" disabled selected>Selecciona tipo...</option>
                        <option value="Carro">Carro</option>
                        <option value="Camioneta">Camioneta / SUV</option>
                        <option value="Moto">Moto</option>
                        <option value="Deportivo">Deportivo</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="marca" placeholder="Marca" required>
                    <input type="text" name="modelo" placeholder="Modelo" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="number" name="ano" placeholder="Año" required>
                    <input type="number" name="kilometraje" placeholder="Kilometraje" required>
                </div>

                <div>
                    <label>Precio Final <span class="text-explosive">(COP)</span></label>
                    <input type="number" name="precio" placeholder="Ej: 35000000" required>
                </div>

                <input type="text" name="whatsapp_contacto" placeholder="WhatsApp (Ej: 57310...)" required>

                <div class="py-4">
                    <label class="text-xs text-gray-500 uppercase">Foto Real <span class="text-explosive">*</span></label>
                    <input type="file" id="foto" required class="mt-2 block w-full text-sm text-gray-500 border-none bg-gray-50 p-3 rounded-lg cursor-pointer">
                </div>

                <label class="flex items-center space-x-3 text-sm text-gray-700 font-medium">
                    <input type="checkbox" name="es_vip" value="true" class="w-5 h-5 accent-explosive"> 
                    <span>Publicidad Destacada (VIP)</span>
                </label>

                <button type="submit" id="btn" class="w-full bg-explosive text-white p-5 rounded-2xl font-bold hover:bg-black transition-colors shadow-lg">
                    Publicar Ahora
                </button>
            </div>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE (USA TUS LLAVES)
        const supabaseUrl = 'https://janxacdehlldxltikooy.supabase.co';
        const supabaseKey = 'sb_publishable_fVFA3TB_TT8z7m3qyZ93QQ_WJ_zq0Yd';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Seguridad: Verificar si hay sesión
        async function verificarSesion() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = '/auth.html';
            }
        }
        verificarSesion();

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "Subiendo a Alejoch Cars...";
            btn.disabled = true;

            // 1. OBTENER EL USUARIO ACTUAL
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                alert("Debes iniciar sesión primero");
                window.location.href = '/auth.html';
                return;
            }

            const formData = new FormData();
            const formElement = e.target;

            // 2. RECOLECTAR DATOS INCLUYENDO EL USER_ID
            formData.append('marca', formElement.marca.value);
            formData.append('modelo', formElement.modelo.value);
            formData.append('ano', formElement.ano.value);
            formData.append('precio', formElement.precio.value);
            formData.append('kilometraje', formElement.kilometraje.value);
            formData.append('whatsapp_contacto', formElement.whatsapp_contacto.value);
            formData.append('tipo_vehiculo', formElement.tipo_vehiculo.value);
            formData.append('es_vip', formElement.es_vip.checked ? 'true' : 'false');
            formData.append('user_id', user.id); // <--- VÍNCULO CON EL DUEÑO

            const fotoFile = document.getElementById('foto').files[0];
            if (!fotoFile) {
                alert("¡Falta la foto del carro!");
                btn.innerText = "Publicar Ahora"; btn.disabled = false;
                return;
            }
            formData.append('foto', fotoFile);

            try {
                const res = await fetch('/api/autos', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    alert("¡Recibido! Tu vehículo está en revisión por Alejoch. 🚀");
                    window.location.href = "/mis-publicaciones.html"; // Redirigir a sus publicaciones
                } else {
                    const errorData = await res.json();
                    alert("Error: " + (errorData.error || "Revisa el servidor"));
                    btn.innerText = "Publicar Ahora"; btn.disabled = false;
                }
            } catch (err) {
                alert("Error de conexión");
                btn.innerText = "Publicar Ahora"; btn.disabled = false;
            }
        };
    </script>
</body>
</html>
