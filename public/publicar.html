<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vender Vehículo | Elite Motors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cobalt: '#0047FF',
                        space: '#0F172A',
                        silver: '#94A3B8'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8FAFC] text-space font-sans">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-cobalt rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-sm italic">E</span>
                </div>
                <h1 class="font-extrabold text-lg tracking-tighter text-space uppercase">Elite Motors</h1>
            </div>
            <a href="/" class="text-sm font-bold text-slate-400 hover:text-space transition">Cancelar</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 md:p-12">
        <header class="mb-10">
            <span class="text-cobalt font-bold tracking-widest uppercase text-[10px]">Formulario de Admisión</span>
            <h2 class="text-4xl font-extrabold text-space tracking-tight mt-1">Registra tu <span class="text-cobalt">Unidad</span></h2>
            <p class="text-slate-400 mt-2">Ingresa los datos técnicos para publicar en nuestra red exclusiva.</p>
        </header>

        <form id="form-publicar" class="space-y-8 bg-white p-8 md:p-10 rounded-[3rem] shadow-2xl shadow-slate-200/50 border border-slate-50">
            
            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase text-silver tracking-widest border-b border-slate-50 pb-2">1. Información Básica</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Marca</label>
                        <input type="text" id="marca" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="Ej: Porsche">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Modelo</label>
                        <input type="text" id="modelo" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="Ej: 911 Carrera">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase text-silver tracking-widest border-b border-slate-50 pb-2">2. Especificaciones Técnicas</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Año</label>
                        <input type="number" id="ano" required min="1900" max="2027" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="2024">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Kilometraje</label>
                        <input type="number" id="kilometraje" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="Ej: 5000">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Categoría</label>
                        <select id="tipo_vehiculo" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all font-medium">
                            <option value="Carro">Automóvil / Deportivo</option>
                            <option value="Camioneta">SUV / Camioneta</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase text-silver tracking-widest border-b border-slate-50 pb-2">3. Comercial & Visual</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Precio (COP Total)</label>
                        <input type="number" id="precio" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all font-bold text-cobalt" placeholder="Ej: 250000000">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">URL de Imagen Principal</label>
                        <input type="url" id="imagen_url" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="https://link-de-foto.jpg">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Descripción de la Unidad</label>
                    <textarea id="descripcion" rows="3" required class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all" placeholder="Estado estético, mantenimientos, extras..."></textarea>
                </div>
            </div>

            <div class="p-6 bg-slate-50 rounded-[2rem] border border-slate-100 space-y-4">
                <h3 class="text-[10px] font-black uppercase text-silver tracking-widest">4. Datos del Propietario</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="nombre_vendedor" required class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm" placeholder="Nombre completo">
                    <input type="number" id="whatsapp" required class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm" placeholder="WhatsApp (Ej: 57300...)">
                </div>
            </div>

            <button type="submit" id="btn-publicar" class="w-full bg-cobalt text-white font-extrabold py-5 rounded-[2rem] text-lg shadow-xl shadow-cobalt/20 hover:bg-blue-700 transition-all transform active:scale-95 flex items-center justify-center gap-3">
                <span>Publicar en Elite Motors</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </form>
    </main>

    <script>
        // Configuración Supabase
        const supabaseUrl = 'https://janxacdehlldxltikooy.supabase.co';
        const supabaseKey = 'TU_SUPABASE_ANON_KEY';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('form-publicar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-publicar');
            
            // Estado de carga
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin text-xl">◌</span> Sincronizando...`;

            // 1. Verificar Usuario
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                alert("Debes iniciar sesión para publicar en Elite Motors.");
                window.location.href = '/auth.html';
                return;
            }

            // 2. Construir Objeto (CONVERSIÓN A NÚMEROS CRÍTICA)
            const nuevoVehiculo = {
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                ano: parseInt(document.getElementById('ano').value), // IMPORTANTE: número
                kilometraje: parseInt(document.getElementById('kilometraje').value), // IMPORTANTE: número
                tipo_vehiculo: document.getElementById('tipo_vehiculo').value,
                precio: parseFloat(document.getElementById('precio').value), // IMPORTANTE: número
                imagen_url: document.getElementById('imagen_url').value,
                descripcion: document.getElementById('descripcion').value,
                nombre_vendedor: document.getElementById('nombre_vendedor').value,
                whatsapp: document.getElementById('whatsapp').value,
                user_id: session.user.id,
                estado: 'pendiente' // Nace en revisión
            };

            // 3. Insertar
            const { error } = await _supabase
                .from('vehiculos')
                .insert([nuevoVehiculo]);

            if (error) {
                alert("Error Elite: " + error.message);
                btn.disabled = false;
                btn.innerText = "Publicar en Elite Motors";
            } else {
                alert("¡Unidad registrada con éxito! Pasará a revisión técnica antes de ser publicada.");
                window.location.href = '/mis-publicaciones.html';
            }
        });
    </script>
</body>
</html>
