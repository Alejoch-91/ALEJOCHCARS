<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors | Curaduría Automotriz Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cobalt: '#0047FF', // Azul Elite
                        space: '#0F172A',  // Gris Espacial Profundo
                        silver: '#94A3B8'  // Plata
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .hero-gradient { background: radial-gradient(circle at top right, #0047FF10, transparent); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0047FF; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-space custom-scrollbar">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-cobalt rounded-xl flex items-center justify-center shadow-lg shadow-cobalt/30">
                    <span class="text-white font-black text-xl italic">E</span>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter">
                    ELITE <span class="text-cobalt">MOTORS</span>
                </h1>
            </div>
            <div class="flex items-center gap-6">
                <a href="/mis-publicaciones.html" class="text-sm font-semibold text-slate-500 hover:text-cobalt transition">Mis Publicaciones</a>
                <a href="/publicar.html" class="bg-cobalt text-white px-6 py-2.5 rounded-2xl font-bold text-sm hover:scale-105 transition-all shadow-xl shadow-cobalt/20">
                    Vender Vehículo
                </a>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 hero-gradient">
        <div class="mb-16 text-center md:text-left">
            <span class="text-cobalt font-bold tracking-widest uppercase text-xs">Exclusividad en cada kilómetro</span>
            <h2 class="text-6xl font-extrabold tracking-tight mt-4 leading-[1.1]">
                Tu próximo destino comienza <br> con un <span class="italic text-cobalt">Elite Motors.</span>
            </h2>
        </div>

        <section class="glass-card p-8 rounded-[2.5rem] border border-white shadow-2xl shadow-slate-200/50 mb-16">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 relative">
                    <span class="absolute left-4 top-4 text-slate-400">🔍</span>
                    <input type="text" id="buscador" onkeyup="filtrarTodo()" 
                           placeholder="Busca por marca, modelo o año..." 
                           class="w-full bg-slate-50 border border-slate-100 p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-cobalt outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mt-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-silver tracking-widest">Categoría</label>
                    <select id="filter-type" onchange="filtrarTodo()" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm font-bold appearance-none">
                        <option value="">Todas las unidades</option>
                        <option value="Carro">Automóviles</option>
                        <option value="Camioneta">SUVs & Camionetas</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-[10px] font-black uppercase text-silver tracking-widest">Presupuesto</label>
                        <span id="price-label" class="text-xs font-bold text-cobalt">$500M+</span>
                    </div>
                    <input type="range" id="filter-price" min="20" max="500" step="10" value="500" 
                           oninput="updatePriceLabel(this.value); filtrarTodo();"
                           class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-cobalt mt-4">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-silver tracking-widest">Año Mínimo</label>
                    <select id="filter-year" onchange="filtrarTodo()" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm font-bold">
                        <option value="">Cualquier año</option>
                        <option value="2024">2024</option>
                        <option value="2022">2022+</option>
                        <option value="2020">2020+</option>
                        <option value="2015">2015+</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-silver tracking-widest">Kilometraje Máx.</label>
                    <select id="filter-km" onchange="filtrarTodo()" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm font-bold">
                        <option value="">Cualquier kilometraje</option>
                        <option value="10000">≤ 10.000 km</option>
                        <option value="40000">≤ 40.000 km</option>
                        <option value="80000">≤ 80.000 km</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="lista-autos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full flex flex-col items-center py-20">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-cobalt rounded-full animate-spin"></div>
                <p class="mt-4 font-bold text-slate-400">Sincronizando inventario Elite...</p>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://janxacdehlldxltikooy.supabase.co';
        const supabaseKey = 'TU_SUPABASE_ANON_KEY';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let allCars = [];

        async function cargarInventario() {
            const { data, error } = await _supabase
                .from('vehiculos')
                .select('*')
                .eq('estado', 'aprobado')
                .order('creado_en', { ascending: false });

            if (error) {
                document.getElementById('lista-autos').innerHTML = `<p class="text-center col-span-full py-20 text-red-500 font-bold">Error al conectar con el servidor Elite.</p>`;
                return;
            }
            allCars = data;
            renderAutos(allCars);
        }

        function renderAutos(autos) {
            const lista = document.getElementById('lista-autos');
            if (autos.length === 0) {
                lista.innerHTML = `<p class="text-center col-span-full py-20 text-slate-400 italic">No se encontraron unidades que coincidan con los criterios Elite.</p>`;
                return;
            }

            lista.innerHTML = autos.map(a => `
                <div class="group bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden hover:shadow-2xl hover:shadow-cobalt/10 transition-all duration-500">
                    <div class="relative h-72 overflow-hidden">
                        <img src="${a.imagen_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-space/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <span class="absolute top-6 left-6 bg-white/90 backdrop-blur-md text-space text-[10px] font-black px-4 py-2 rounded-full shadow-sm tracking-tighter uppercase">
                            ${a.tipo_vehiculo}
                        </span>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-cobalt text-[10px] font-black uppercase tracking-widest">${a.marca}</p>
                                <h3 class="text-2xl font-extrabold tracking-tight">${a.modelo}</h3>
                            </div>
                            <span class="bg-slate-50 text-slate-400 text-[10px] font-bold px-3 py-1 rounded-lg">${a.ano}</span>
                        </div>
                        <p class="text-slate-400 text-sm font-medium mb-6 italic">${Number(a.kilometraje).toLocaleString()} kilómetros certificados</p>
                        
                        <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                            <div>
                                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Inversión Elite</p>
                                <p class="text-2xl font-black text-space">$${Number(a.precio).toLocaleString('es-CO')}</p>
                            </div>
                            <a href="/detalle.html?id=${a.id}" class="w-12 h-12 bg-slate-50 text-space rounded-2xl flex items-center justify-center group-hover:bg-cobalt group-hover:text-white transition-all shadow-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrarTodo() {
            const search = document.getElementById('buscador').value.toLowerCase();
            const type = document.getElementById('filter-type').value;
            const priceLimit = parseInt(document.getElementById('filter-price').value) * 1000000;
            const yearMin = parseInt(document.getElementById('filter-year').value) || 0;
            const kmMax = parseInt(document.getElementById('filter-km').value) || Infinity;

            const filtrados = allCars.filter(c => {
                const searchStr = `${c.marca} ${c.modelo} ${c.ano}`.toLowerCase();
                const cumpleTexto = searchStr.includes(search);
                const cumpleTipo = !type || c.tipo_vehiculo === type;
                const cumplePrecio = priceLimit >= 500000000 || c.precio <= priceLimit;
                const cumpleAno = c.ano >= yearMin;
                const cumpleKm = c.kilometraje <= kmMax;
                return cumpleTexto && cumpleTipo && cumplePrecio && cumpleAno && cumpleKm;
            });
            renderAutos(filtrados);
        }

        function updatePriceLabel(v) {
            document.getElementById('price-label').innerText = v >= 500 ? "$500M+" : `$${v} Millones`;
        }

        cargarInventario();
    </script>
</body>
</html>
